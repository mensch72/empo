metadata:
  name: "7x3 Ensemble — centered robot"
  description: >
    A 7x3 BushWorld for the random-map-ensemble demo. Two humans at the ends of
    the middle row, robot in the centre. Every cell starts at bush density 1
    (B=1), so the robot must clear a path before either human can move.
  author: "EMPO Framework"
  category: "bushworld"

map: |
  1 1 1 1 1 1 1
  Hu 1 1 Ro 1 1 Hu
  1 1 1 1 1 1 1

B: 1
max_steps: 12
fill_density: 1
